<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Customer Registration Form</title>
</head>
 <style>
     .error {color: red}
 </style>
<body>
    <li>Fill out the form. </li>
    <br/><br>

  <form th:action="@{/processForm}" th:object="customerAtt" method="post">
      First Name: <input type="text" th:field="*{firstName}"><br><br>

      Last Name (*):  <input type="text" th:field="*{lastName}"><br><br>
      <!-- error messages     -->
      <span th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="error" />

      <input type="submit" value="Submit">
  </form>
</body>
</html>
