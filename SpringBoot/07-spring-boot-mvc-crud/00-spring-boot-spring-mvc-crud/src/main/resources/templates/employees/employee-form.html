<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container p-5">
        <h4>Employee Form</h4>
        <hr>
        <p>Save Employee</p>
        <form action="#" th:action="@{/employees/save}" th:object="${employeeAtt}" method="post" >
        <!--Add a hidden form to handle the update  -->
            <input type="hidden" th:field="*{id}" >
            <input type="text" th:field="*{firstName}" class="form-control mb-3 w-25" id="firstName" placeholder="First Name"/>
            <input type="text" th:field="*{lastName}" class="form-control mb-3 w-25" id="lastName" placeholder="Last Name"/>
            <input type="text" th:field="*{email}" class="form-control mb-3 w-25" id="email" placeholder="Email"/>

            <button type="submit" class="btn btn-info col-2">Submit</button>
        </form>
        <hr>
        <a th:href="@{/employees/list}">Back to Employee</a>
    </div>

</body>
</html>
